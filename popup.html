<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      margin: 0;
    }
    
    .container {
      text-align: center;
    }
    
    h1 {
      font-size: 18px;
      margin-bottom: 20px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }
    
    .section {
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 15px;
      backdrop-filter: blur(10px);
    }
    
    input {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      text-align: center;
      margin-bottom: 10px;
      box-sizing: border-box;
    }
    
    button {
      width: 100%;
      padding: 10px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.3s;
      margin-bottom: 5px;
    }
    
    button:hover {
      background: #45a049;
    }
    
    button.secondary {
      background: #ff6b6b;
    }
    
    button.secondary:hover {
      background: #ff5252;
    }
    
    .room-code {
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 2px;
      background: rgba(255,255,255,0.2);
      padding: 10px;
      border-radius: 5px;
      margin: 10px 0;
    }
    
    .status {
      font-size: 12px;
      margin-top: 10px;
      opacity: 0.8;
    }
    
    .controls {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }
    
    .controls button {
      flex: 1;
      padding: 8px;
      font-size: 12px;
    }
    
    .color-picker {
      display: flex;
      gap: 5px;
      justify-content: center;
      margin: 10px 0;
    }
    
    .color-btn {
      width: 25px;
      height: 25px;
      border-radius: 50%;
      border: 2px solid white;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .color-btn:hover {
      transform: scale(1.1);
    }
    
    .color-btn.active {
      transform: scale(1.2);
      box-shadow: 0 0 10px rgba(255,255,255,0.8);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎨 共有お絵描き</h1>
    
    <div class="section">
      <div id="joinSection">
        <input type="text" id="roomCodeInput" placeholder="8桁コードを入力" maxlength="8">
        <button id="joinRoom">部屋に参加</button>
      </div>
      
      <div id="roomSection" style="display: none;">
        <div>現在の部屋:</div>
        <div class="room-code" id="currentRoom"></div>
        <button id="leaveRoom" class="secondary">退室</button>
      </div>
    </div>
    
    <div class="section">
      <button id="createRoom">新しい部屋を作成</button>
      <div class="status" id="status">オフライン</div>
    </div>
    
    <div class="section">
      <div>描画色:</div>
      <div class="color-picker">
        <div class="color-btn active" style="background: #000000" data-color="#000000"></div>
        <div class="color-btn" style="background: #ff0000" data-color="#ff0000"></div>
        <div class="color-btn" style="background: #00ff00" data-color="#00ff00"></div>
        <div class="color-btn" style="background: #0000ff" data-color="#0000ff"></div>
        <div class="color-btn" style="background: #ffff00" data-color="#ffff00"></div>
        <div class="color-btn" style="background: #ff00ff" data-color="#ff00ff"></div>
      </div>
      
      <div class="controls">
        <button id="toggleDraw">描画: ON</button>
        <button id="clearCanvas" class="secondary">クリア</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
